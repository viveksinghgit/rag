# Docker Compose for Local Development

services:
  # Ollama Local LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_storage:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Pull local models once Ollama is reachable.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama pull $$OLLAMA_MODEL &&
      ollama pull $$OLLAMA_EMBEDDING_MODEL
    depends_on:
      ollama:
        condition: service_healthy

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_ADMIN_KEY:-local-rag-admin-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./backend:/app
      - ./docs:/app/docs:ro
    environment:
      DEBUG: "true"
      ENVIRONMENT: "local"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Must match QDRANT__SERVICE__API_KEY set on the qdrant service above
      QDRANT_ADMIN_KEY: ${QDRANT_ADMIN_KEY:-local-rag-admin-key}
    depends_on:
      qdrant:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Node.js frontend (dev server)
  frontend:
    image: node:18-alpine
    container_name: rag-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  qdrant_storage:
  ollama_storage:

networks:
  default:
    name: rag-network
