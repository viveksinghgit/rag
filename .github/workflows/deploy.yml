name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_arm:
        description: "Skip ARM template deployment (infra already exists)"
        type: boolean
        default: false
      ingest_docs:
        description: "Trigger document ingestion after deploy"
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build & push backend Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          IMAGE_BASE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rag-backend"
          SHA_TAG="${IMAGE_BASE}:sha-${SHORT}"
          LATEST_TAG="${IMAGE_BASE}:latest"

          echo "Building image: ${SHA_TAG}"

          docker buildx build \
            --push \
            --tag "${SHA_TAG}" \
            --tag "${LATEST_TAG}" \
            --cache-from "type=registry,ref=${IMAGE_BASE}:buildcache" \
            --cache-to   "type=registry,ref=${IMAGE_BASE}:buildcache,mode=max" \
            ./backend

          echo "Pushed: ${SHA_TAG}"
          echo "Pushed: ${LATEST_TAG}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build React frontend
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net
        run: |
          npm ci
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy to Azure
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Compute the same short SHA used in the build job — no cross-job passing needed
      - name: Set image reference
        id: image
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          FULL="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rag-backend:sha-${SHORT}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${FULL}"

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 3a. Deploy ARM template ──────────────────────────────────────────────
      - name: Deploy ARM template
        if: ${{ !inputs.skip_arm }}
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./terraform/azuredeploy.json
          parameters: >
            appName=${{ secrets.AZURE_APP_NAME }}
            qdrantAdminKey=${{ secrets.QDRANT_ADMIN_KEY }}
            groqApiKey=${{ secrets.GROQ_API_KEY }}
            mistralApiKey=${{ secrets.MISTRAL_API_KEY }}
            backendDockerImage=${{ steps.image.outputs.full }}

      # ── 3b. Enable static website ────────────────────────────────────────────
      - name: Enable static website hosting
        run: |
          az storage blob service-properties update \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
            --account-key  "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
            --static-website \
            --index-document index.html \
            --404-document index.html

      # ── 3c. Upload React build ────────────────────────────────────────────────
      - name: Upload frontend to Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
            --account-key  "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
            --source frontend/build/ \
            --destination '$web' \
            --overwrite true

      # ── 3d. Pin App Service to the exact sha- image ─────────────────────────
      - name: Update App Service image
        run: |
          FULL="${{ steps.image.outputs.full }}"
          echo "Updating App Service to: ${FULL}"
          az webapp config container set \
            --name "${{ secrets.AZURE_APP_NAME }}-app" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --docker-custom-image-name "${FULL}"

      # ── 3e. Restart App Service ───────────────────────────────────────────────
      - name: Restart App Service
        run: |
          az webapp restart \
            --name "${{ secrets.AZURE_APP_NAME }}-app" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      # ── 3f. Wait for /health (5 min timeout) ─────────────────────────────────
      - name: Wait for backend health
        run: |
          BACKEND_URL="https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net"
          echo "Image: ${{ steps.image.outputs.full }}"
          echo "Polling: ${BACKEND_URL}/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "${BACKEND_URL}/health" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy (attempt ${i})"
              curl -sf "${BACKEND_URL}/health" | python3 -m json.tool
              break
            fi
            echo "  attempt ${i}/30 — HTTP ${STATUS}, retrying in 15s..."
            sleep 15
          done
          # Hard fail if still not up after 30 attempts (7.5 minutes)
          curl -sf "${BACKEND_URL}/health" > /dev/null

      # ── 3g. Test /query endpoint readiness ────────────────────────────────────
      - name: Test backend query readiness
        run: |
          BACKEND_URL="https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net"
          echo "Testing backend query endpoint..."
          for i in $(seq 1 10); do
            RESPONSE=$(curl -sf -X POST "${BACKEND_URL}/query" \
              -H "Content-Type: application/json" \
              -d '{"query": "test", "top_k": 1}' 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "Backend ready for queries (attempt ${i})"
              break
            fi
            echo "  attempt ${i}/10 — no response, retrying in 10s..."
            sleep 10
          done

      # ── 3h. Ingest documents ──────────────────────────────────────────────────
      - name: Ingest documents
        if: ${{ inputs.ingest_docs != false }}
        run: |
          BACKEND_URL="https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net"
          echo "Starting document ingestion..."
          echo "POST ${BACKEND_URL}/ingest"
          
          # Try up to 3 times with increasing delays
          for attempt in $(seq 1 3); do
            echo "Attempt ${attempt}/3..."
            
            RESPONSE=$(curl -s -X POST "${BACKEND_URL}/ingest" \
              -H "Content-Type: application/json" \
              --max-time 60 2>/dev/null || echo "")
            
            if [ -n "$RESPONSE" ]; then
              echo "Got response from ingestion endpoint:"
              echo "$RESPONSE" | python3 -c "
              import sys, json
              try:
                  data = json.loads(sys.stdin.read())
                  print(json.dumps(data, indent=2))
                  if data.get('status') == 'success':
                      print('✅ Ingestion completed successfully')
                      sys.exit(0)
                  else:
                      print('⚠️  Ingestion completed with warnings/errors')
                      sys.exit(1)
              except json.JSONDecodeError as e:
                  print(f'❌ Invalid JSON response: {e}')
                  print('Raw response:', repr(sys.stdin.read()[:500]))
                  sys.exit(1)
              " && break
            else
              echo "  No response (attempt ${attempt})"
              if [ $attempt -lt 3 ]; then
                sleep $((attempt * 10))  # 10s, 20s, 30s delays
              fi
            fi
          done
          
          if [ -z "$RESPONSE" ]; then
            echo "⚠️  Warning: Could not reach ingestion endpoint after 3 attempts"
            echo "This may be normal if the backend is still initializing"
            echo "You can manually trigger ingestion later via the API"
          fi

      # ── 3h. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "══════════════════════════════════════════"
          echo "  Deployment complete"
          echo "══════════════════════════════════════════"
          echo "  Image      : ${{ steps.image.outputs.full }}"
          echo "  Backend    : https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net"
          echo "  Swagger    : https://${{ secrets.AZURE_APP_NAME }}-app.azurewebsites.net/docs"
          echo ""
